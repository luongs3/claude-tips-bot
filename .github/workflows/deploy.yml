name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VPS_HOST: 31.220.75.26
      VPS_USER: root
      VPS_PATH: /root/claude-tips-bot
    steps:
      - uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_PRIVATE_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Rsync source to VPS
        run: |
          rsync -avz --delete \
            --exclude .env \
            --exclude .env.* \
            --exclude node_modules \
            --exclude digests \
            --exclude .git \
            --exclude .github \
            --exclude .DS_Store \
            ./ "$VPS_USER@$VPS_HOST:$VPS_PATH/"

      - name: Install deps on VPS
        run: |
          ssh "$VPS_USER@$VPS_HOST" "cd $VPS_PATH && npm ci --omit=dev --no-audit --no-fund"

      - name: Smoke test (load config + scraper require)
        run: |
          ssh "$VPS_USER@$VPS_HOST" "cd $VPS_PATH && node -e \"require('./config'); require('./scraper'); require('./curator'); require('./telegram'); console.log('require check OK')\""

      - name: Show cron entry
        run: |
          ssh "$VPS_USER@$VPS_HOST" "crontab -l | grep claude-tips-bot || echo 'WARNING: cron entry missing'"
