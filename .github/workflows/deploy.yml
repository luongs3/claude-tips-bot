name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: self-hosted
    env:
      VPS_PATH: /root/claude-tips-bot

    steps:
      - uses: actions/checkout@v4

      - name: Rsync source to bot directory
        run: |
          rsync -avz --delete \
            --exclude .env \
            --exclude .env.* \
            --exclude node_modules \
            --exclude digests \
            --exclude .git \
            --exclude .github \
            --exclude .DS_Store \
            ./ "$VPS_PATH/"

      - name: Install deps
        run: |
          cd "$VPS_PATH" && npm ci --omit=dev --no-audit --no-fund

      - name: Smoke test (require all modules)
        run: |
          cd "$VPS_PATH" && node -e "require('./config'); require('./scraper'); require('./curator'); require('./telegram'); console.log('require check OK')"

      - name: Show cron entry
        run: |
          crontab -l | grep claude-tips-bot || echo 'WARNING: cron entry missing'
